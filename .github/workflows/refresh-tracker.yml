name: Refresh Riyadh RE tracker

on:
  schedule:
    - cron: "0 * * * *"      # hourly: collect + save data
  workflow_dispatch:           # manual run also builds + deploys

permissions:
  contents: write              # commit refreshed data back
  pages: write                 # deploy to GitHub Pages
  id-token: write              # required by deploy-pages

concurrency:
  group: tracker-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet pandas

      - name: Collect newest raw-land plots (SREM)   # runs hourly
        run: python _tracker_build/collect_land.py || echo "land collect failed; continuing with existing data"

      - name: Decide whether to deploy (once a day 05:00 UTC, or manual)
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(date -u +%H)" = "05" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild dashboard        # only on deploy days
        if: steps.gate.outputs.deploy == 'true'
        run: python _tracker_build/build_tracker.py

      - name: Prepare Pages site       # serve the tracker as index.html
        if: steps.gate.outputs.deploy == 'true'
        run: |
          mkdir -p _site
          cp riyadh-real-estate-tracker.html _site/index.html

      - name: Configure Pages
        if: steps.gate.outputs.deploy == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.gate.outputs.deploy == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages   # once a day, free, no credit wall
        id: deploy
        if: steps.gate.outputs.deploy == 'true'
        uses: actions/deploy-pages@v4

      - name: Commit refreshed data    # hourly: persist SREM data (+ HTML on deploy days)
        run: |
          git config user.name "rcc-tracker-bot"
      